name: Deploy to Production

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.version }}"
          REGISTRY="${{ secrets.ECR_REGISTRY }}"

          docker build \
            -t "$REGISTRY/backend:$IMAGE_TAG" \
            -t "$REGISTRY/backend:latest" \
            -f backend/Dockerfile \
            backend/

          docker push "$REGISTRY/backend:$IMAGE_TAG"
          docker push "$REGISTRY/backend:latest"

      - name: Build and push frontend
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.version }}"
          REGISTRY="${{ secrets.ECR_REGISTRY }}"

          docker build \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            -t "$REGISTRY/frontend:$IMAGE_TAG" \
            -t "$REGISTRY/frontend:latest" \
            -f frontend/Dockerfile \
            frontend/

          docker push "$REGISTRY/frontend:$IMAGE_TAG"
          docker push "$REGISTRY/frontend:latest"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/app

            export ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"

            # Login to ECR
            $(aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY)

            # Pull latest images
            docker-compose -f docker-compose.prod.yml pull

            # Zero-downtime rolling update
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # Cleanup old images to save disk space
            docker system prune -f

            # Wait for containers to be healthy
            sleep 20

            # Verify deployment
            curl -f http://localhost:3000/health || (echo "Health check failed" && exit 1)

            echo "✅ Deployment successful: $IMAGE_TAG"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed for ${{ github.sha }}"
          # Add Slack/Discord webhook notification here if desired
